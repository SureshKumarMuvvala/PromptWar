steps:
  # ── Build & push backend image ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/eha-backend', './backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/eha-backend']

  # ── Deploy backend to Cloud Run ────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'eha-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/eha-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'

  # ── Build & push frontend image ────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/eha-frontend', '--build-arg', 'VITE_API_BASE_URL=${_BACKEND_URL}', './frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/eha-frontend']

  # ── Deploy frontend to Cloud Run ───────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'eha-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/eha-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/eha-backend'
  - 'gcr.io/$PROJECT_ID/eha-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
